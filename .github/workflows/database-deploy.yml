name: Database migration release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Preview pending migrations or apply them to production
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply
          - baseline-history
      baseline_through:
        description: Last already-applied 14-digit version, only for baseline-history
        required: false
        default: "20260711000001"
        type: string

permissions:
  contents: read

concurrency:
  group: production-database-migrations
  cancel-in-progress: false

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migration files
        run: npm run check:migrations

      - name: Validate team data scope
        run: npm run check:team-scope

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID" && exit 1)

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show migration status
        run: supabase migration list

      - name: Baseline manually applied migration history
        if: inputs.mode == 'baseline-history'
        env:
          BASELINE_THROUGH: ${{ inputs.baseline_through }}
        shell: bash
        run: |
          [[ "$BASELINE_THROUGH" =~ ^[0-9]{14}$ ]] || (echo "baseline_through must be 14 digits" && exit 1)
          for file in supabase/migrations/*.sql; do
            version="$(basename "$file" | cut -d_ -f1)"
            if [[ "$version" > "$BASELINE_THROUGH" ]]; then
              continue
            fi
            supabase migration repair --status applied "$version"
          done
          supabase migration list

      - name: Preview pending migrations
        if: inputs.mode == 'dry-run'
        run: supabase db push --dry-run

      - name: Apply pending migrations
        if: inputs.mode == 'apply'
        run: supabase db push
